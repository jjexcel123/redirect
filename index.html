<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
    <style>
        body {
            background-color: #0f1014;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        h1 { margin-bottom: 40px; letter-spacing: 2px; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        .game-card {
            background: #1e2026;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 1px solid transparent;
        }

        /* Hover Effect */
        .game-card:hover {
            transform: translateY(-10px);
            background: #2a2d36;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: #4e54c8;
        }

        .game-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            border-radius: 12px;
            object-fit: cover;
        }

        .game-title {
            font-weight: 600;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1>GAMES</h1>

    <div class="game-grid">
        <!-- Game 1 -->
        <a href="https://jjexcel123.github.io/test/" class="game-card">
            <img src="https://flaticon.com" alt="Game 1" class="game-icon">
            <div class="game-title">Bitplanes</div>
        </a>

        <!-- Game 2 -->
        <a href="https://jjexcel123.github.io/poolparty/" class="game-card">
            <img src="https://flaticon.com" alt="Game 2" class="game-icon">
            <div class="game-title">Moto X3M Pool Party</div>
        </a>

        <!-- Game 3 -->
        <a href="https://jjexcel123.github.io/polytrack/" class="game-card">
            <img src="https://flaticon.com" alt="Game 3" class="game-icon">
            <div class="game-title">Polytrack</div>
        </a>

        <!-- Add more games here -->
    </div>

</body>
</html>
